name: Download Files (Like UDL-3)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download URLs (separate with space)'
        required: true
        type: string
      password:
        description: 'Password for ZIP (optional)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: "Download Files"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc

      - name: Download files with aria2
        run: |
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          # Create directories
          mkdir -p downloads temp_downloads
          
          # Split threshold (90MB like UDL-3)
          SPLIT_THRESHOLD_MB=90
          
          # Function to encode URL for GitHub raw links
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          # Download each URL
          for URL in $URLS; do
            # Extract filename from URL
            FILENAME=$(basename "$URL" | sed 's/[?#].*//' | sed 's/[<>:"|?*]/_/g')
            if [ -z "$FILENAME" ]; then
              FILENAME="file_$(date +%s)"
            fi
            
            echo "Downloading: $URL -> $FILENAME"
            
            # Download with aria2
            aria2c \
              --max-connection-per-server=4 \
              --split=4 \
              --min-split-size=10M \
              --max-tries=5 \
              --retry-wait=5 \
              --timeout=60 \
              --connect-timeout=30 \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --dir="temp_downloads" \
              --out="$FILENAME" \
              "$URL"
            
            if [ -f "temp_downloads/$FILENAME" ] && [ -s "temp_downloads/$FILENAME" ]; then
              FILE_SIZE=$(stat -c%s "temp_downloads/$FILENAME")
              FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
              echo "✓ Downloaded: $FILENAME (${FILE_SIZE_MB} MB)"
            else
              echo "✗ Failed: $FILENAME"
              rm -f "temp_downloads/$FILENAME"
            fi
          done
          
          # Process downloaded files
          if [ -n "$(ls -A temp_downloads 2>/dev/null)" ]; then
            for FILE in temp_downloads/*; do
              [ -f "$FILE" ] || continue
              [ -s "$FILE" ] || continue
              
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              FOLDER_NAME="${BASENAME_NO_EXT}_$(date +%H%M%S)"
              
              mkdir -p "downloads/$FOLDER_NAME"
              FILE_SIZE=$(stat -c%s "$FILE")
              FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
              
              if [ "$FILE_SIZE" -gt $((SPLIT_THRESHOLD_MB * 1024 * 1024)) ]; then
                # Split large files into 90MB parts
                echo "Splitting $BASENAME (${FILE_SIZE_MB} MB) into ${SPLIT_THRESHOLD_MB}MB parts"
                
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_THRESHOLD_MB}m \
                    "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              else
                # Small files - single zip
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" \
                    "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j \
                    "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
                fi
              fi
              
              # Create README with download links
              REPO_OWNER="${{ github.repository_owner }}"
              REPO_NAME="${{ github.event.repository.name }}"
              BRANCH="${GITHUB_REF_NAME}"
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              
              {
                echo "# $BASENAME_NO_EXT"
                echo ""
                echo "## Download Links"
                echo ""
                
                # List all parts
                for PART in $(ls "downloads/$FOLDER_NAME/"*.zip "downloads/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort -V); do
                  PART_NAME=$(basename "$PART")
                  PART_ENCODED=$(urlencode "$PART_NAME")
                  echo "- [$PART_NAME](https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED})"
                done
                
                echo ""
                echo "## Extract Instructions"
                echo "1. Download all parts"
                echo "2. Open ${FOLDER_NAME}.zip with 7-Zip or WinRAR"
                echo "3. Extract the file"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "4. Use password: \`$ZIP_PASSWORD\`"
                fi
              } > "downloads/$FOLDER_NAME/README.md"
              
              echo "✓ Processed: $FOLDER_NAME"
            done
          else
            echo "No files were downloaded successfully"
            exit 1
          fi
          
          rm -rf temp_downloads

      - name: Create main README with all links
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          # Create or update downloads/README.md
          {
            echo "# Downloaded Files"
            echo ""
            echo "| Folder | Download Link |"
            echo "|--------|---------------|"
          } > downloads/README.md
          
          for FOLDER in downloads/*/; do
            [ -d "$FOLDER" ] || continue
            FOLDER_NAME=$(basename "$FOLDER")
            FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
            echo "| $FOLDER_NAME | [Open]($REPO_OWNER/$REPO_NAME/tree/$BRANCH/downloads/$FOLDER_ENCODED) |" >> downloads/README.md
          done

      - name: Commit and push to repository
        run: |
          git fetch origin
          git checkout "${GITHUB_REF_NAME}" || git checkout -b "${GITHUB_REF_NAME}"
          
          # Add all downloaded files
          git add downloads/
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download files [skip ci]"
            
            # Push with retry
            for i in 1 2 3 4 5; do
              if git push origin HEAD:"${GITHUB_REF_NAME}"; then
                echo "Successfully pushed to repository"
                break
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
              git pull --rebase origin "${GITHUB_REF_NAME}" || true
            done
          fi

      - name: Show download links
        run: |
          echo ""
          echo "========================================="
          echo "✅ DOWNLOAD COMPLETE!"
          echo "========================================="
          echo ""
          echo "📁 Your files are in the 'downloads' folder:"
          echo "   https://github.com/${{ github.repository }}/tree/${GITHUB_REF_NAME}/downloads"
          echo ""
          echo "🔗 Direct download links:"
          
          find downloads -name "*.zip" -o -name "*.z[0-9]*" | while read -r FILE; do
            echo "   https://raw.githubusercontent.com/${{ github.repository }}/${GITHUB_REF_NAME}/$FILE"
          done
          echo ""
          echo "========================================="
